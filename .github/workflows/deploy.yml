name: Deploy to EC2

on:
  push:
    branches:
      - prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRIVATE_SSH_KEY_PROD }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              ubuntu@${{ secrets.EC2_HOST_PROD }} \
              "cd /home/ubuntu/practice_cicd && \
               git pull origin prod && \
               npm install && \
               npm run build && \
               pm2 restart practice-cicd || pm2 start npm --name 'practice-cicd' -- start"

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key