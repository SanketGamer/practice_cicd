name: Deploy to EC2

on:
  push:
    branches:
      - prod

jobs:
  deploy:
    name: Push to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v3

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRIVATE_SSH_KEY_PROD }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: executing remote ssh commands
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST_PROD }}
          username: ubuntu
          key_path: /home/runner/.ssh/deploy_key
          port: 22
          script: |
            cd /home/ubuntu/practice_cicd
            git pull origin prod
            npm install
            npm run build
            pm2 restart practice-cicd || pm2 start npm --name "practice-cicd" -- start

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key